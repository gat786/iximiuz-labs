name: Zip Directory and Release - buildpacks

on:
  workflow_dispatch:

permissions:
  contents: write # required to create a release

jobs:
  zip-artifacts:
    strategy:
      fail-fast: true
      matrix:
        directory:
          - "creating-docker-images-without-writing-dockerfiles-using-buildpacks-4c989678/examples"
          - "creating-docker-images-without-writing-dockerfiles-using-buildpacks-4c989678/tutorial-code"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Locate target directory
        id: locate
        env:
          INPUT: ${{ matrix.directory }}
        run: |
          # First try the input as a direct path
          if [ -d "$INPUT" ]; then
            FOUND="$INPUT"
          else
            # Otherwise search the repo for a directory with that name
            FOUND=$(find . -type d -name "$INPUT" -not -path '*/.git/*' | head -n 1)
          fi

          if [ -z "$FOUND" ] || [ ! -d "$FOUND" ]; then
            echo "::error::Directory '$INPUT' was not found in the repository."
            exit 1
          fi

          FOUND="${FOUND#./}"                 # strip leading ./
          BASENAME="$(basename "$FOUND")"

          echo "dir=$FOUND"        >> "$GITHUB_OUTPUT"
          echo "name=$BASENAME"    >> "$GITHUB_OUTPUT"
          echo "Found directory: $FOUND"

      - name: Create zip archive
        id: zip
        run: |
          DIR="${{ steps.locate.outputs.dir }}"
          NAME="${{ steps.locate.outputs.name }}"
          ZIP="${NAME}.zip"

          PARENT="$(dirname "$DIR")"
          BASE="$(basename "$DIR")"

          # Zip so the archive contains just "<dir>/..." at the top level
          ( cd "$PARENT" && zip -r "$GITHUB_WORKSPACE/$ZIP" "$BASE" )

          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "Created archive: $ZIP"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.locate.outputs.name }}
          path: ${{ steps.zip.outputs.zip }}

  create-release:
    runs-on: ubuntu-latest
    needs:
      - zip-artifacts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v8
        id: download-arts
        with:
          merge-multiple: true
          path: ${{ github.workspace }}/release-artifacts

      - name: Unzip
        working-directory: ${{ github.workspace }}/release-artifacts
        run: |
            unzip examples.zip
            unzip tutorial-code.zip
            rm *.zip

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          ART_DIR: release-artifacts
          ZIP_FILE_NAME: artifacts.zip
        working-directory: ${{ github.workspace }}
        run: |
          zip -r $ZIP_FILE_NAME $ART_DIR;
          ZIP="$ZIP_FILE_NAME"
          TAG="release-${{ github.run_number }}"

          gh release create "$TAG" "$ZIP" \
            --title "$TAG" \
            --notes "Automated release examples and tutorial-code directory."
